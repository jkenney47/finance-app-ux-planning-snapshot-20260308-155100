name: Plan Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  plan-gate:
    name: Gemini+Codex Plan Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}" > /tmp/changed-files.txt
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              git diff --name-only "HEAD~1...HEAD" > /tmp/changed-files.txt
            else
              git diff-tree --no-commit-id --name-only -r HEAD > /tmp/changed-files.txt
            fi
          fi

          if [[ ! -s /tmp/changed-files.txt ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat /tmp/changed-files.txt

      - name: Enforce plan gate
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          cat /tmp/changed-files.txt | bash scripts/check-plan-gate.sh --files-from-stdin
