name: Quality Checks

on:
  workflow_dispatch:
  schedule:
    # Daily quality safety-net run (cron is UTC).
    - cron: "35 13 * * *"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-checks-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Enforce high and critical dependency audit threshold
        run: npm run security:audit:summary

      - name: Run canonical validation gate
        run: npm run validate

      - name: Run instruction drift check
        run: npm run check:instruction-drift
