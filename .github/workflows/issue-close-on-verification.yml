name: Issue Auto-Close On Verification

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  close-on-verification:
    name: Close verified automation issue
    if: github.event.issue.pull_request == null && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Close issue when verification is confirmed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/issue-close-on-verification.mjs
