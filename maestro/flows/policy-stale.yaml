appId: com.financepal.app
---
- launchApp
- runFlow:
    when:
      visible:
        text: This is the developer menu. It gives you access to useful tools in your development builds.
    commands:
      - tapOn:
          text: Continue
- runFlow:
    when:
      visible:
        text: "Connected to:"
    commands:
      - tapOn:
          text: "Go home"
- runFlow:
    when:
      visible:
        text: "http://.*:8081"
    commands:
      - tapOn:
          text: "http://.*:8081"
- runFlow:
    when:
      visible:
        text: "Source code explorer"
    commands:
      - tapOn:
          text: "Go home"
- runFlow:
    when:
      visible:
        id: onboarding-screen-title
    commands:
      - tapOn:
          id: onboarding-finish-partial
- assertVisible:
    id: dashboard-screen-title
- assertVisible:
    id: dashboard-primary-recommendation-connect_accounts
- assertVisible:
    id: dashboard-next-step-action
- tapOn:
    id: dashboard-next-step-action
- assertVisible:
    id: plaid-link-screen-title
- assertVisible:
    id: plaid-link-mode-mock
- tapOn:
    id: plaid-link-primary
- assertVisible:
    id: dashboard-screen-title
- assertVisible:
    id: dashboard-policy-stale-domains
- assertVisible:
    id: dashboard-primary-recommendation-tackle_toxic_debt
- tapOn:
    id: tab-roadmap
- assertVisible:
    id: journey-screen-title
- assertVisible:
    id: journey-current-mode-stabilize
- assertVisible:
    id: journey-primary-recommendation-tackle_toxic_debt
- assertVisible:
    id: journey-policy-status-section
- assertVisible:
    id: journey-policy-domain-thresholds-stale
- assertVisible:
    id: journey-milestone-cash_flow_truth-status-complete
- assertVisible:
    id: journey-milestone-toxic_debt_purge-status-in_progress
- assertVisible:
    id: journey-milestone-deductible_shield-status-blocked_policy_stale
- assertVisible:
    id: journey-milestone-fortress_fund-status-blocked_policy_stale
- tapOn:
    id: journey-open-policy-ops
- assertVisible:
    id: policy-ops-screen-title
