appId: com.financepal.app
---
- launchApp
- runFlow:
    when:
      visible:
        text: This is the developer menu. It gives you access to useful tools in your development builds.
    commands:
      - tapOn:
          text: Continue
- runFlow:
    when:
      visible:
        text: "Connected to:"
    commands:
      - tapOn:
          text: "Go home"
- runFlow:
    when:
      visible:
        text: "http://.*:8081"
    commands:
      - tapOn:
          text: "http://.*:8081"
- runFlow:
    when:
      visible:
        text: "Source code explorer"
    commands:
      - tapOn:
          text: "Go home"
- runFlow:
    when:
      visible:
        id: onboarding-screen-title
    commands:
      - tapOn:
          id: onboarding-finish-partial
- assertVisible:
    id: dashboard-screen-title
- assertVisible:
    id: dashboard-primary-recommendation-connect_accounts
- assertVisible:
    id: dashboard-next-step-action
- tapOn:
    id: dashboard-next-step-action
- assertVisible:
    id: plaid-link-screen-title
- assertVisible:
    id: plaid-link-mode-mock
- tapOn:
    id: plaid-link-primary
- assertVisible:
    id: dashboard-screen-title
- assertVisible:
    id: dashboard-primary-recommendation-stabilize_cash_flow
- tapOn:
    id: tab-roadmap
- assertVisible:
    id: journey-screen-title
- assertVisible:
    id: journey-current-mode-crisis
- assertVisible:
    id: journey-primary-recommendation-stabilize_cash_flow
- assertVisible:
    id: journey-milestones-section
- assertVisible:
    id: journey-milestone-cash_flow_truth-status-in_progress
